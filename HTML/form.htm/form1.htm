<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body bgcolor="cyan">
    <div align="center">
        <form name="myfrm" method="get" action="http://127.0.0.1:5500/hello.html">
        <h1><i><U>MY PERSONAL INFORMATION</i></U></h1>
        <table>
            <tr>
                <td><label for="text1"><b>Enter Your Name</b></label></td>
                <td><input name="text" id="txt1" type="text" value="Enter Your Name"></td>
            </tr>

            <tr>
                <td><label for="Pass1"><b>Enter Your Password</b></label></td>
                <td><input name="Pass1" id="pass1" type="password"></td>
            </tr>

            <tr>
                <td><label for="email1"><b>Enter Your E-mail</b></label></td>
                <td><input name="email1" id="email1" type="email"></td>
            </tr>

            <tr>
                <td><label for="Num1"><b>Enter Your Age</b></label></td>
                <td><input name="Num1" id="nui1" type="number"></td>
            </tr>   

            <tr>
                <td><label for="Hob1"><b>Enter Your Hobbies</b></label></td>
                <td>
                    <input name="Hob1" id="ho1" type="checkbox" value="singing" checked>Singing
                    <input name="Hob1" id="ho2" type="checkbox" value="dancing">Dancing
                    <input name="Hob1" id="ho3" type="checkbox" value="reading">Reading
                </td>
            </tr>

            <tr>
                <td><label for="gen1"><b>Enter Your Gender</b></label></td>
                <td>
                    <input name="gen1" id="go1" type="radio" value="Male">Male
                    <input name="gen1" id="go2" type="radio" value="Female" checked>Female
                    <input name="gen1" id="go3" type="radio" value="Other">Other
                </td>
            </tr> 
            
            <tr>
                <td><label for="file1"><b>Enter Your File</b></label></td>
                <td><input name="file1" id="file1" type="file"></td>
            </tr>                         

            <tr>
                <td><label for="url1"><b>Enter Your URL</b></label></td>
                <td><input name="url1" id="url1" type="url" multiple></td>
            </tr>  

            <tr>
                <td><label for="textarea1"><b>Enter Your Address</b></label></td>
                <td><textarea name="textarea1" rows="4" cols="20"></textarea></td>
            </tr>  

            <tr>
                <td><label for="col1"><b>Enter Your Color</b></label></td>
                <td><input name="col1" id="col1" type="color"></td>
            </tr>
            
            <tr>
                <td><label for="dot1"><b>Enter Your Date of Birth</b></label></td>
                <td><input name="dot1" id="dot1" type="date"></td>
            </tr>  

            <tr>
                <td><input type="submit" value="Send"></td>
                <td><input type="reset" value="Cancel"></td>
            </tr>  
        </table>
        </form>
    </div>
</body>
</html>
