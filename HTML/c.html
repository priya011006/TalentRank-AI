<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Demo</title>
    <style type="text/css">
        table,th,td{
            border: 3px solid green;
            border-spacing: 3px;
        }
    </style>
</head>
<body>
    <table border="1">
    
        <caption align="bottom">My Data</caption>
        <tr bgcolor="yellow">
            <th>Roll No.</th>
            <th>Student's Name</th>
            <th>Class</th>
            <th>Branch</th>
        </tr>
        
        
        <tr bgcolor="cyan">
        <td align="Center">17</td>
        <td align="Center">Mikasa Ackerman</td>
        <td align="Center">CS IIE</td>
        <td align="Center">CSE</td>
        </tr>

        <tr bgcolor="pink">
            <td align="center">27</td>
            <td align="center">Rose Dawson</td>
            <td align="center">CS IIB</td>
            
            </tr>

            <tr>
                <td colspan="2">Total</td>
                <td>2</td>
            </tr>
           
            
    </table>
</body>
</html>
